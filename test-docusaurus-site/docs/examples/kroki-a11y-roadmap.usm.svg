<svg xmlns="http://www.w3.org/2000/svg" id="usm" width="1744" height="1300" data-test-id="diagram" style="background-color:#f5f5f6" viewBox="0 0 1800 1300"><defs><filter id="highlight" width="1" height="1" x="0" y="0"><feFlood flood-color="#ff0"/><feComposite in="SourceGraphic" operator="xor"/></filter><style>._f7af2d7e:hover{cursor:pointer}._7e7f4142{background-color:#transparent}._4daca9ba{padding:8px;font-family:'Nunito Sans',apple-system,BlinkMacSystemFont,Helvetica Neue,Hiragino Kaku Gothic ProN,游ゴシック Medium,YuGothic,YuGothicM,メイリオ,Meiryo,sans-serif;word-wrap:break-word;cursor:pointer}</style></defs><defs><filter id="shadow" height="120%"><feGaussianBlur in="SourceAlpha" stdDeviation="2"/><feOffset dx="3" dy="3" result="offsetblur"/><feComponentTransfer><feFuncA slope=".3" type="linear"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><g fill="#F5F5F6" style="will-change:transform"><path d="M0 0 0 0"/><g class="card" data-test-id="card-5"><rect width="140" height="64" x="140" y="10" fill="#266B9A" stroke="rgba(0, 0, 0, 0.05)" class="ts-card _f7af2d7e" rx="1" ry="1" style="filter:url(#shadow)"/><foreignObject width="140" height="64" x="140" y="10" fill="#FFF" class="ts-text" color="#FFF" font-size="12"><div xmlns="http://www.w3.org/1999/xhtml" class="_4daca9ba"><span class="_7e7f4142">remark-kroki-a11y roadmap</span></div></foreignObject></g><g class="card" data-test-id="card-6"><rect width="140" height="64" x="140" y="10" fill="#266B9A" stroke="rgba(0, 0, 0, 0.05)" class="ts-card _f7af2d7e" rx="1" ry="1" style="filter:url(#shadow)"/><foreignObject width="140" height="64" x="140" y="10" fill="#FFF" class="ts-text" color="#FFF" font-size="12"><div xmlns="http://www.w3.org/1999/xhtml" class="_4daca9ba"><span class="_7e7f4142">Diagrammen modelleren</span></div></foreignObject></g><g class="card" data-test-id="card-7"><rect width="140" height="64" x="140" y="10" fill="#266B9A" stroke="rgba(0, 0, 0, 0.05)" class="ts-card _f7af2d7e" rx="1" ry="1" style="filter:url(#shadow)"/><text x="146" y="34" fill="#FFF" color="#FFF" cursor="pointer" font-family="'Nunito Sans', apple-system, BlinkMacSystemFont, Helvetica Neue, Hiragino Kaku Gothic ProN, 游ゴシック Medium, YuGothic,YuGothicM, メイリオ, Meiryo, sans-serif" font-size="12">		Als docent&amp;</text></g><g class="card" data-test-id="card-8"><rect width="140" height="64" x="140" y="10" fill="#266B9A" stroke="rgba(0, 0, 0, 0.05)" class="ts-card _f7af2d7e" rx="1" ry="1" style="filter:url(#shadow)"/><foreignObject width="140" height="64" x="140" y="10" fill="#FFF" class="ts-text" color="#FFF" font-size="12"><div xmlns="http://www.w3.org/1999/xhtml" class="_4daca9ba"><span class="_7e7f4142">US-01 Als developer wil ik PlantUML en Mermaid diagrammen in docs kunnen opnemen, zodat ik diagram-as-code kan gebruiken</span></div></foreignObject></g><g class="card" data-test-id="card-9"><rect width="140" height="64" x="140" y="10" fill="#266B9A" stroke="rgba(0, 0, 0, 0.05)" class="ts-card _f7af2d7e" rx="1" ry="1" style="filter:url(#shadow)"/><foreignObject width="140" height="64" x="140" y="10" fill="#FFF" class="ts-text" color="#FFF" font-size="12"><div xmlns="http://www.w3.org/1999/xhtml" class="_4daca9ba"><span class="_7e7f4142">US-02 Als developer wil ik source tabs en a11y-beschrijving onder diagrammen zien, zodat ik output kan controleren</span></div></foreignObject></g><g class="card" data-test-id="card-10"><rect width="140" height="64" x="140" y="10" fill="#266B9A" stroke="rgba(0, 0, 0, 0.05)" class="ts-card _f7af2d7e" rx="1" ry="1" style="filter:url(#shadow)"/><foreignObject width="140" height="64" x="140" y="10" fill="#FFF" class="ts-text" color="#FFF" font-size="12"><div xmlns="http://www.w3.org/1999/xhtml" class="_4daca9ba"><span class="_7e7f4142">US-03 Als developer wil ik robuuste C4&amp;</span></div></foreignObject></g><g class="card" data-test-id="card-11"><rect width="140" height="64" x="140" y="10" fill="#266B9A" stroke="rgba(0, 0, 0, 0.05)" class="ts-card _f7af2d7e" rx="1" ry="1" style="filter:url(#shadow)"/><foreignObject width="140" height="64" x="140" y="10" fill="#FFF" class="ts-text" color="#FFF" font-size="12"><div xmlns="http://www.w3.org/1999/xhtml" class="_4daca9ba"><span class="_7e7f4142">Diagrammen toegankelijk begrijpen</span></div></foreignObject></g><g class="card" data-test-id="card-12"><rect width="140" height="64" x="140" y="10" fill="#266B9A" stroke="rgba(0, 0, 0, 0.05)" class="ts-card _f7af2d7e" rx="1" ry="1" style="filter:url(#shadow)"/><foreignObject width="140" height="64" x="140" y="10" fill="#FFF" class="ts-text" color="#FFF" font-size="12"><div xmlns="http://www.w3.org/1999/xhtml" class="_4daca9ba"><span class="_7e7f4142">Als slechtziende, blinde of beginnende developer wil ik de diagraminhoud kunnen begrijpen</span></div></foreignObject></g><g class="card" data-test-id="card-13"><rect width="140" height="64" x="140" y="10" fill="#266B9A" stroke="rgba(0, 0, 0, 0.05)" class="ts-card _f7af2d7e" rx="1" ry="1" style="filter:url(#shadow)"/><foreignObject width="140" height="64" x="140" y="10" fill="#FFF" class="ts-text" color="#FFF" font-size="12"><div xmlns="http://www.w3.org/1999/xhtml" class="_4daca9ba"><span class="_7e7f4142">US-04 Als lezer wil ik natural-language beschrijvingen bij ondersteunde diagramtypen krijgen, zodat ik het diagram zonder visuele inspectie begrijp</span></div></foreignObject></g><g class="card" data-test-id="card-14"><rect width="140" height="64" x="140" y="10" fill="#266B9A" stroke="rgba(0, 0, 0, 0.05)" class="ts-card _f7af2d7e" rx="1" ry="1" style="filter:url(#shadow)"/><foreignObject width="140" height="64" x="140" y="10" fill="#FFF" class="ts-text" color="#FFF" font-size="12"><div xmlns="http://www.w3.org/1999/xhtml" class="_4daca9ba"><span class="_7e7f4142">US-05 Als lezer wil ik fallback-tekst en duidelijke status bij niet-ondersteunde diagramtypen, zodat ik weet wat ontbreekt</span></div></foreignObject></g><g class="card" data-test-id="card-15"><rect width="140" height="64" x="140" y="10" fill="#266B9A" stroke="rgba(0, 0, 0, 0.05)" class="ts-card _f7af2d7e" rx="1" ry="1" style="filter:url(#shadow)"/><foreignObject width="140" height="64" x="140" y="10" fill="#FFF" class="ts-text" color="#FFF" font-size="12"><div xmlns="http://www.w3.org/1999/xhtml" class="_4daca9ba"><span class="_7e7f4142">US-06 Als slechtziende, blinde of beginnende developer wil ik direct in VS Code de a11y informatie van remark-kroki-a11y kunnen zien en beluisteren bij een diagram dat ik aan het maken ben, zodat ik tijdens het ontwikkelen al ondersteuning heb</span></div></foreignObject></g><g class="card" data-test-id="card-16"><rect width="140" height="64" x="140" y="10" fill="#266B9A" stroke="rgba(0, 0, 0, 0.05)" class="ts-card _f7af2d7e" rx="1" ry="1" style="filter:url(#shadow)"/><foreignObject width="140" height="64" x="140" y="10" fill="#FFF" class="ts-text" color="#FFF" font-size="12"><div xmlns="http://www.w3.org/1999/xhtml" class="_4daca9ba"><span class="_7e7f4142">Snel valideren en experimenteren</span></div></foreignObject></g><g class="card" data-test-id="card-17"><rect width="140" height="64" x="140" y="10" fill="#266B9A" stroke="rgba(0, 0, 0, 0.05)" class="ts-card _f7af2d7e" rx="1" ry="1" style="filter:url(#shadow)"/><foreignObject width="140" height="64" x="140" y="10" fill="#FFF" class="ts-text" color="#FFF" font-size="12"><div xmlns="http://www.w3.org/1999/xhtml" class="_4daca9ba"><span class="_7e7f4142">Als contributor wil ik snel kunnen testen of diagram + a11y klopt</span></div></foreignObject></g><g class="card" data-test-id="card-18"><rect width="140" height="64" x="140" y="10" fill="#266B9A" stroke="rgba(0, 0, 0, 0.05)" class="ts-card _f7af2d7e" rx="1" ry="1" style="filter:url(#shadow)"/><foreignObject width="140" height="64" x="140" y="10" fill="#FFF" class="ts-text" color="#FFF" font-size="12"><div xmlns="http://www.w3.org/1999/xhtml" class="_4daca9ba"><span class="_7e7f4142">US-07 Als contributor wil ik een online kroki-a11y playground met render + source + natural language tabs, zodat ik snel iteraties kan doen</span></div></foreignObject></g><g class="card" data-test-id="card-19"><rect width="140" height="64" x="140" y="10" fill="#266B9A" stroke="rgba(0, 0, 0, 0.05)" class="ts-card _f7af2d7e" rx="1" ry="1" style="filter:url(#shadow)"/><foreignObject width="140" height="64" x="140" y="10" fill="#FFF" class="ts-text" color="#FFF" font-size="12"><div xmlns="http://www.w3.org/1999/xhtml" class="_4daca9ba"><span class="_7e7f4142">US-08 Als contributor wil ik server keuze (kroki.io, localhost, custom) en health status, zodat ik lokaal en online betrouwbaar kan testen</span></div></foreignObject></g><g class="card" data-test-id="card-20"><rect width="140" height="64" x="140" y="10" fill="#266B9A" stroke="rgba(0, 0, 0, 0.05)" class="ts-card _f7af2d7e" rx="1" ry="1" style="filter:url(#shadow)"/><foreignObject width="140" height="64" x="140" y="10" fill="#FFF" class="ts-text" color="#FFF" font-size="12"><div xmlns="http://www.w3.org/1999/xhtml" class="_4daca9ba"><span class="_7e7f4142">US-09 Als contributor wil ik live editing met shareable links in de online editor, zodat feedback en review sneller gaan</span></div></foreignObject></g><g class="card" data-test-id="card-21"><rect width="140" height="64" x="140" y="10" fill="#266B9A" stroke="rgba(0, 0, 0, 0.05)" class="ts-card _f7af2d7e" rx="1" ry="1" style="filter:url(#shadow)"/><foreignObject width="140" height="64" x="140" y="10" fill="#FFF" class="ts-text" color="#FFF" font-size="12"><div xmlns="http://www.w3.org/1999/xhtml" class="_4daca9ba"><span class="_7e7f4142">Domeinverhaal naar backlog brengen</span></div></foreignObject></g><g class="card" data-test-id="card-22"><rect width="140" height="64" x="140" y="10" fill="#266B9A" stroke="rgba(0, 0, 0, 0.05)" class="ts-card _f7af2d7e" rx="1" ry="1" style="filter:url(#shadow)"/><foreignObject width="140" height="64" x="140" y="10" fill="#FFF" class="ts-text" color="#FFF" font-size="12"><div xmlns="http://www.w3.org/1999/xhtml" class="_4daca9ba"><span class="_7e7f4142">Als team wil ik Domain Stories verbinden met ontwerp en planning</span></div></foreignObject></g><g class="card" data-test-id="card-23"><rect width="140" height="64" x="140" y="10" fill="#266B9A" stroke="rgba(0, 0, 0, 0.05)" class="ts-card _f7af2d7e" rx="1" ry="1" style="filter:url(#shadow)"/><foreignObject width="140" height="64" x="140" y="10" fill="#FFF" class="ts-text" color="#FFF" font-size="12"><div xmlns="http://www.w3.org/1999/xhtml" class="_4daca9ba"><span class="_7e7f4142">US-10 Als team wil ik Domain Stories naast UML&amp;</span></div></foreignObject></g><g class="card" data-test-id="card-24"><rect width="140" height="64" x="140" y="10" fill="#266B9A" stroke="rgba(0, 0, 0, 0.05)" class="ts-card _f7af2d7e" rx="1" ry="1" style="filter:url(#shadow)"/><foreignObject width="140" height="64" x="140" y="10" fill="#FFF" class="ts-text" color="#FFF" font-size="12"><div xmlns="http://www.w3.org/1999/xhtml" class="_4daca9ba"><span class="_7e7f4142">US-11 Als team wil ik vanuit Domain Stories user stories en slices kunnen afleiden, zodat refinement en releaseplanning beter gaan</span></div></foreignObject></g></g></svg>